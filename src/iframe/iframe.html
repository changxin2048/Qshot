<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qshot - 子弹搜索</title>
    <link rel="stylesheet" href="iframe.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="cards-panel">
        <div id="iframes-container" class="iframes-container" data-columns="1"></div>
      </section>

      <aside id="siteNavPanel" class="site-nav-panel" hidden>
        <div class="site-nav-header">AI 模型</div>
        <div id="siteNavList" class="site-nav-list"></div>
      </aside>

      <aside id="historyPanel" class="history-panel">
        <div class="history-panel-header">
          <h3>搜索记录</h3>
          <div class="history-header-actions">
            <button id="clearHistoryBtn" class="history-clear-btn" type="button">清空</button>
            <button id="closeHistoryPanelBtn" class="history-close-btn" type="button" aria-label="关闭"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </aside>

      <section class="bottom-composer">
        <span id="globalStatus" class="global-status visually-hidden">正在加载站点配置...</span>

        <div id="cardNavRow" class="card-nav-row">
          <div id="cardNavStrip" class="card-nav-strip"></div>
          <div class="add-site-menu-wrap">
            <button id="addSiteBtn" class="card-nav-add-btn composer-tooltip-btn" type="button" aria-label="临时添加卡片" data-tooltip="添加卡片" aria-expanded="false">+</button>
            <div id="addSitePopover" class="add-site-popover" hidden>
              <button id="closeAddSitePopoverBtn" class="add-site-close-btn" type="button" aria-label="关闭">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
              <div id="addSiteTabs" class="add-site-tabs"></div>
              <div id="addSiteList" class="add-site-list"></div>
            </div>
          </div>
        </div>

        <div class="bottom-composer-row">
        <div class="bottom-composer-bar">
          <div class="composer-input-shell">
            <div class="composer-input-row">
              <textarea
                id="queryInput"
                class="bottom-query-input"
                placeholder="在这里输入问题，然后发送到当前选中的 AI 卡片"
                rows="2"
              ></textarea>
            </div>

            <div class="composer-toolbar-row">
              <div class="composer-left-tools">
                <button id="historyToggleBtn" class="composer-tool-btn composer-tool-icon-btn composer-tooltip-btn" type="button" aria-label="历史搜索" data-tooltip="历史记录">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                      <path d="M12 8v4l2 2"></path>
                      <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"></path>
                    </g>
                  </svg>
                </button>
                <button id="exportBtn" class="composer-tool-btn composer-tool-icon-btn composer-tooltip-btn" type="button" aria-label="导出文档" data-tooltip="导出为文档">
                  <svg viewBox="0 0 1024 1024" aria-hidden="true">
                    <path d="M750.952139 1023.999132H195.742046A156.152839 156.152839 0 0 1 39.589207 859.171136V173.833678A173.503154 173.503154 0 0 1 74.289838 52.38147 182.178312 182.178312 0 0 1 213.092361 0.330524h485.808831l34.700631 17.350315 164.827996 190.853469a43.375789 43.375789 0 0 1 17.350316 34.700631v52.050946a52.050946 52.050946 0 0 1-43.375789 43.375789 43.375789 43.375789 0 0 1-43.375788-43.375789V260.585255L681.550877 87.082101H213.092361a86.751577 86.751577 0 0 0-69.401262 26.025473A104.101892 104.101892 0 0 0 126.340784 173.833678v685.337458c0 78.076419 60.726104 78.076419 69.401262 78.076419h555.210093a86.751577 86.751577 0 0 0 86.751577-69.401261 43.375789 43.375789 0 0 1 52.050946-26.025473c26.025473 0 34.700631 26.025473 34.700631 52.050946a190.853469 190.853469 0 0 1-173.503154 130.127365z" fill="currentColor"></path>
                    <path d="M933.13045 624.941878H438.646461a43.375789 43.375789 0 0 1-43.375788-43.375788 43.375789 43.375789 0 0 1 43.375788-43.375789h399.057255l-78.07642-78.076419c-8.675158-17.350315-8.675158-52.050946 8.675158-60.726104a43.375789 43.375789 0 0 1 60.726104 0l138.802523 156.152839a26.025473 26.025473 0 0 1 8.675158 43.375788 43.375789 43.375789 0 0 1-43.375789 26.025473z" fill="currentColor"></path>
                    <path d="M785.652769 763.744401h-34.70063a34.700631 34.700631 0 0 1 8.675157-69.401261L907.104977 555.540617a43.375789 43.375789 0 0 1 60.726104 60.726103L811.678242 755.069244z" fill="currentColor"></path>
                  </svg>
                </button>
                <div class="layout-menu-wrap">
                  <button id="layoutToggleBtn" class="composer-tool-btn composer-tool-icon-btn composer-tooltip-btn" type="button" aria-label="布局设置" data-tooltip="布局调整">
                      <svg viewBox="0 0 1024 1024" stroke="currentColor" stroke-width="26" stroke-linejoin="round" aria-hidden="true">
                      <path d="M169 169v686h686V169H169z m640 46v146H215V215h594zM215 407h145.8v402H215V407z m191.8 402V407H809v402H406.8z" fill="currentColor"></path>
                    </svg>
                  </button>
                  <div id="layoutPopover" class="layout-popover" hidden>
                    <div class="layout-option-group">
                      <div class="layout-option-title">呈现形式</div>
                      <div class="layout-option-row">
                        <button class="layout-option-btn" type="button" data-layout-rows="1">1排</button>
                        <button class="layout-option-btn" type="button" data-layout-rows="2">2排</button>
                        <button class="layout-option-btn" type="button" data-layout-rows="3">3排</button>
                        <button class="layout-option-btn" type="button" data-layout-mode="sidebar">侧边</button>
                      </div>
                    </div>
                    <div id="cardSizeGroup" class="layout-option-group">
                      <div class="layout-option-title">宽度</div>
                      <div class="layout-option-row">
                        <button class="layout-option-btn" type="button" data-card-size="small">小</button>
                        <button class="layout-option-btn" type="button" data-card-size="medium">中</button>
                        <button class="layout-option-btn" type="button" data-card-size="large">大</button>
                      </div>
                    </div>
                  </div>
                </div>

              </div>

              <div class="composer-inline-actions">
                <button id="newChatBtn" class="composer-inline-icon composer-tooltip-btn" type="button" aria-label="新建对话" data-tooltip="新建对话">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                  </svg>
                </button>

                <div class="composer-prompt-wrap">
                  <button id="promptAssistBtn" class="composer-inline-icon" type="button" aria-label="提示词" aria-expanded="false">
                    <svg viewBox="0 0 1024 1024" aria-hidden="true">
                      <path d="M855.071605 339.499431l-10.216418 26.934193c-7.430122 19.718401-31.077915 19.718401-38.508037 0l-10.144975-26.934193c-18.146645-48.010021-50.724873-86.303727-91.447658-107.165224l-31.435132-16.146227c-16.860662-8.716105-16.860662-37.150611 0-45.866717l29.649045-15.217461c41.722994-21.433045 75.015657-61.084178 92.805084-110.737399l10.430749-29.148941c7.287235-20.289949 31.506576-20.289949 38.793811 0l10.430749 29.148941c17.860871 49.653221 51.08209 89.304354 92.876528 110.737399l29.577602 15.217461c16.932105 8.716105 16.932105 37.150611 0 45.866717l-31.363689 16.074783c-40.722785 20.932941-73.372457 59.226647-91.447659 107.236668zM413.265106 95.234163h164.891559v95.305606H413.265106c-136.671383 0-247.480225 127.883835-247.480225 285.773932 0 171.89302 101.592633 284.130732 329.926005 403.87001v-118.096078h82.445779c136.671383 0 247.480225-127.955278 247.480225-285.773932h82.44578c0 210.401057-147.673679 381.008095-329.926005 381.008095v166.677646C371.970773 928.765279 83.339102 785.878313 83.339102 476.313701 83.339102 265.769757 231.012781 95.234163 413.265106 95.234163z"></path>
                    </svg>
                  </button>
                  <div id="promptPicker" class="composer-prompt-picker" hidden></div>
                </div>

                <button id="sendSelectedBtn" class="composer-inline-icon composer-inline-icon-send is-empty" type="button" aria-label="发送">
                  <svg viewBox="0 0 1024 1024" aria-hidden="true">
                    <path d="M554.666667 268.8v601.6h-85.333334V268.8L337.066667 401.066667 277.333333 341.333333 512 106.666667 746.666667 341.333333l-59.733334 59.733334L554.666667 268.8z" fill="currentColor"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        </div>
      </section>
    </div>

    <script src="../config/baseConfig.js"></script>
    <script src="../shared/prompt-item.js"></script>
    <script src="iframe.js"></script>
  </body>
</html>
