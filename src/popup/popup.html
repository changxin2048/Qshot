<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qshot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="popup-panel">
        <header class="popup-header">
          <img src="logo.svg" alt="Qshot" class="popup-title-logo" />
        </header>

        <section class="search-composer" aria-label="搜索输入区">
          <textarea
            id="popupQueryInput"
            class="popup-query-input"
            rows="1"
            placeholder="输入你要搜索的"
          ></textarea>

          <div class="composer-actions-row">
            <button id="randomPromptBtn" class="composer-icon-btn" type="button" aria-label="随机问题">
              <span class="dice-icon" aria-hidden="true">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                  <path d="M817.493333 310.997333L533.333333 146.944a42.666667 42.666667 0 0 0-42.666666 0L206.506667 310.997333a42.666667 42.666667 0 0 0-21.333334 36.949334v328.106666a42.666667 42.666667 0 0 0 21.333334 36.992l284.16 164.053334a42.666667 42.666667 0 0 0 42.666666 0l284.16-164.053334a42.666667 42.666667 0 0 0 21.333334-36.992v-328.106666a42.666667 42.666667 0 0 0-21.333334-36.949334zM554.666667 109.994667l284.16 164.053333a85.333333 85.333333 0 0 1 42.666666 73.898667v328.106666a85.333333 85.333333 0 0 1-42.666666 73.898667L554.666667 914.090667a85.333333 85.333333 0 0 1-85.333334 0l-284.16-164.053334a85.333333 85.333333 0 0 1-42.666666-73.898666V347.904a85.333333 85.333333 0 0 1 42.666666-73.898667L469.333333 109.994667a85.333333 85.333333 0 0 1 85.333334 0z"></path>
                  <path d="M490.666667 524.501333L160.213333 338.602667l20.906667-37.205334L512 487.552l330.88-186.154667 20.906667 37.205334-330.453334 185.898666V896h-42.666666v-371.498667z"></path>
                  <path d="M469.333333 298.666667a42.666667 42.666667 0 1 0 85.333334 0 42.666667 42.666667 0 0 0-85.333334 0zM347.861333 633.941333a32.725333 32.725333 0 1 1-32.725333-56.661333 32.725333 32.725333 0 0 1 32.725333 56.661333zM286.72 535.296a32.682667 32.682667 0 1 1-32.682667-56.533333 32.682667 32.682667 0 0 1 32.682667 56.533333zM414.72 727.296a32.682667 32.682667 0 1 1-32.682667-56.533333 32.682667 32.682667 0 0 1 32.682667 56.533333zM712.32 558.890667a32.725333 32.725333 0 1 0 32.682667-56.661334 32.725333 32.725333 0 0 0-32.682667 56.661334zM625.621333 709.034667a32.682667 32.682667 0 1 0 32.682667-56.618667 32.682667 32.682667 0 0 0-32.682667 56.618667z"></path>
                </svg>
              </span>
            </button>

            <button id="promptEntryBtn" class="composer-icon-btn" type="button" aria-label="提示词入口" aria-expanded="false">
              <span class="sparkle-icon" aria-hidden="true">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                  <path d="M855.071605 339.499431l-10.216418 26.934193c-7.430122 19.718401-31.077915 19.718401-38.508037 0l-10.144975-26.934193c-18.146645-48.010021-50.724873-86.303727-91.447658-107.165224l-31.435132-16.146227c-16.860662-8.716105-16.860662-37.150611 0-45.866717l29.649045-15.217461c41.722994-21.433045 75.015657-61.084178 92.805084-110.737399l10.430749-29.148941c7.287235-20.289949 31.506576-20.289949 38.793811 0l10.430749 29.148941c17.860871 49.653221 51.08209 89.304354 92.876528 110.737399l29.577602 15.217461c16.932105 8.716105 16.932105 37.150611 0 45.866717l-31.363689 16.074783c-40.722785 20.932941-73.372457 59.226647-91.447659 107.236668zM413.265106 95.234163h164.891559v95.305606H413.265106c-136.671383 0-247.480225 127.883835-247.480225 285.773932 0 171.89302 101.592633 284.130732 329.926005 403.87001v-118.096078h82.445779c136.671383 0 247.480225-127.955278 247.480225-285.773932h82.44578c0 210.401057-147.673679 381.008095-329.926005 381.008095v166.677646C371.970773 928.765279 83.339102 785.878313 83.339102 476.313701 83.339102 265.769757 231.012781 95.234163 413.265106 95.234163z"></path>
                </svg>
              </span>
            </button>
          </div>

          <div id="promptPicker" class="popup-prompt-picker" hidden></div>
        </section>

        <div id="popupGroups" class="popup-groups"></div>

        <section class="popup-history-section" aria-labelledby="popupHistoryTitle">
          <div class="section-divider">
            <span id="popupHistoryTitle" class="section-divider-label">历史搜索</span>
          </div>
          <div id="popupHistoryList" class="popup-history-list"></div>
        </section>
      </section>

      <div class="popup-actions">
        <button id="openSettingsBtn" class="settings-entry-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex:none">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="settings-entry-label">设置</span>
        </button>
      </div>
    </main>
    <script src="../shared/prompt-item.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
