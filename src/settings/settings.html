      <section class="settings-content">
        <header class="settings-content-header">
          <p id="sectionEyebrow" class="settings-eyebrow" hidden>搜索组设置</p>
          <div id="sectionLogoWrap" class="settings-logo-wrap" hidden>
            <img src="about-logo.svg" alt="Qshot" class="settings-logo-image" />
          </div>
          <div id="sectionTitleRow" class="settings-title-row">
            <h2 id="sectionTitle">分组与调用内容</h2>
            <div id="promptsHeaderActions" class="settings-header-actions" hidden>
              <button type="button" id="promptImportBtn" class="prompt-header-action-btn">导入</button>
              <button type="button" id="promptExportBtn" class="prompt-header-action-btn" title="导出为 Markdown 文件&#10;• 分组名称 → 一级标题（# ）&#10;• 提示词标题 → 二级标题（## ）&#10;• 提示词内容紧跟其后&#10;&#10;注：内容中已有的 # 符号会自动转义，避免结构混乱">导出</button>
            </div>
            <a id="promptLearnLink" class="prompt-learn-link" href="https://lcnsnquw7oz5.feishu.cn/wiki/SVO0wZW7Cif2szkhKZJcy3MBnJe" target="_blank" rel="noopener noreferrer" hidden>学习提示词</a>
          </div>
          <p id="sectionSubtitle" class="settings-subtitle">管理搜索组名称、启用状态、打开方式，以及每个组内调用的网站或 AI 模型。</p>
        </header>

        <section id="groupsSection" class="settings-section"></section>
        <section id="promptsSection" class="settings-section" hidden></section>
        <section id="customSection" class="settings-section" hidden></section>
        <section id="otherSection" class="settings-section" hidden></section>
        <section id="aboutSection" class="settings-section" hidden></section>
      </section>
    </main>

    <script src="../config/baseConfig.js"></script>
